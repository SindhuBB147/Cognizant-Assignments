<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3 - Welcome Message</title>

    <style>
        #welcomeBanner{
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight{
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="welcomeBanner">
    <h1>Welcome to the Local Community Event Portal</h1>
    <p>Stay updated with the latest community events.</p>
</div>

<p>
    Register now and get
    <span style="color:red; font-weight:bold;">20% OFF</span>
    on premium event passes.
</p>

<p class="highlight">
    Upcoming Event: Tree Plantation Drive on Sunday.
</p>

<p class="highlight">
    Hurry! Limited seats available.
</p>

</body>
</html>
