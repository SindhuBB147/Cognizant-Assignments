<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4 - Image Gallery</title>

    <style>
        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        .eventImage {
            width: 250px;
            height: 180px;
            border: 3px solid black;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<table>
    <caption>Community Event Gallery</caption>

    <tr>
        <td>
            <img src="event1.jpeg" alt="Tree Plantation" title="Tree Plantation" class="eventImage">
            <p>Tree Plantation Drive</p>
        </td>

        <td>
            <img src="event2.jpeg" alt="Blood Donation" title="Blood Donation Camp" class="eventImage">
            <p>Blood Donation Camp</p>
        </td>

        <td>
            <img src="event3.jpeg" alt="Cultural Festival" title="Cultural Festival" class="eventImage">
            <p>Cultural Festival</p>
        </td>
    </tr>

    <tr>
        <td>
            <img src="event4.jpeg" alt="Sports Event" title="Sports Event" class="eventImage">
            <p>Sports Competition</p>
        </td>

        <td>
            <img src="event5.jpeg" alt="Food Festival" title="Food Festival" class="eventImage">
            <p>Food Festival</p>
        </td>

        <td>
            <img src="promo.jpeg" alt="Music Concert" title="Music Concert" class="eventImage">
            <p>Music Concert</p>
        </td>
    </tr>

</table>

</body>
</html>
