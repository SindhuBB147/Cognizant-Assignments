<!DOCTYPE html>
<html>
<head>
    <title>Exercise 11.2 - Media Object Layout</title>

    <link rel="stylesheet" href="Bootstrap css js/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <div class="d-flex align-items-center border p-3 rounded shadow-sm">

        <img src="images.jpeg"
             alt="Profile Image"
             class="me-3 rounded"
             style="width:120px; height:120px; object-fit:cover;">

        <div>
            <h5>Media Heading</h5>

            <p class="mb-0">
                This is a sample media object layout. The image is aligned
                to the left and the content appears on the right side.
                Bootstrap Flexbox utilities are used to create this layout.
            </p>
        </div>

    </div>

</div>

</body>
</html>
