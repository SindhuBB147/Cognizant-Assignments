<!DOCTYPE html>
<html>
<head>
    <title>Exercise 8.2</title>
    <link rel="stylesheet" href="Bootstrap css js/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2>Login Form</h2>

    <form>

        <div class="form-floating mb-3">
            <input type="email"
                   class="form-control"
                   id="email"
                   placeholder="Email">
            <label for="email">Email Address</label>
        </div>

        <div class="form-floating mb-3">
            <input type="password"
                   class="form-control"
                   id="password"
                   placeholder="Password">
            <label for="password">Password</label>
        </div>

        <button class="btn btn-success">
            Login
        </button>

    </form>

</div>

</body>
</html>
