<!DOCTYPE html>
<html>
<head>
    <title>Exercise 9.2</title>
    <link rel="stylesheet" href="Bootstrap css js/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2>Button Group</h2>

    <div class="btn-group mb-4">

        <button class="btn btn-primary">
            Left
        </button>

        <button class="btn btn-primary">
            Middle
        </button>

        <button class="btn btn-primary">
            Right
        </button>

    </div>

    <h2>Toggle Button</h2>

    <input type="checkbox"
           class="btn-check"
           id="toggleBtn">

    <label class="btn btn-outline-success"
           for="toggleBtn">
        Toggle Me
    </label>

</div>

</body>
</html>
